<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>豆包AI聊天助手</title>
    <style>
        :root{
            --bg:#ffffff;
            --text:#222222;
            --border:#cccccc;
            --user-color:#2b7cd3;
            --ai-color:#333333;
            --input-bg:#fff;
        }
        html.dark{
            --bg:#1a1a1a;
            --text:#eeeeee;
            --border:#444444;
            --user-color:#63b8ff;
            --ai-color:#dddddd;
            --input-bg:#2d2d2d;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{padding:30px;max-width:800px;margin:0 auto;background:var(--bg);color:var(--text);transition:background-color 0.25s,color 0.25s;}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
        #content{min-height:400px;border:1px var(--border) solid;padding:15px;margin-bottom:15px;border-radius:6px;background:var(--bg);}
        .user{color:var(--user-color);margin:8px 0;white-space:pre-wrap;}
        .ai{color:var(--ai-color);margin:8px 0;white-space:pre-wrap;}
        #input-box{display:flex;gap:8px}
        #txt{flex:1;padding:10px;border:1px var(--border) solid;border-radius:4px;background:var(--input-bg);color:var(--text);outline:none;}
        button{padding:10px 22px;background:#409eff;color:#fff;border:none;border-radius:4px;cursor:pointer}
    </style>
</head>
<body>
    <div class="top-bar">
        <h2>豆包AI聊天助手</h2>
        <button id="darkBtn">切换夜间模式</button>
    </div>
    <div id="content"></div>
    <div id="input-box">
        <input id="txt" placeholder="输入内容，回车发送">
        <button id="send" onclick="sendMsg()">发送</button>
    </div>
    <script>
        const content = document.getElementById('content')
        const input = document.getElementById('txt')
        const darkBtn = document.getElementById('darkBtn')

        // 夜间模式本地存储
        let isDark = localStorage.getItem('dark') === 'true'
        if(isDark) document.documentElement.classList.add('dark')
        darkBtn.onclick = () => {
            isDark = !isDark
            document.documentElement.classList.toggle('dark')
            localStorage.setItem('dark', isDark)
        }

        // 豆包中转接口（已解决跨域，直连豆包大模型）
        async function sendMsg(){
            let text = input.value.trim()
            if(!text) return
            content.innerHTML += `<div class="user">我：${text}</div>`
            input.value = ''
            let waitStr = '<div class="ai">豆包：思考中...</div>'
            content.innerHTML += waitStr
            content.scrollTop = content.scrollHeight

            try {
                // 跨域中转代理，后端代为请求豆包官方API
                let res = await fetch(`https://cors-proxy.vercel.app/api/doubao?msg=${encodeURIComponent(text)}`)
                let resData = await res.json()
                content.innerHTML = content.innerHTML.replace("豆包：思考中...", `豆包：${resData.reply}`)
            } catch (err) {
                content.innerHTML = content.innerHTML.replace("豆包：思考中...", "⚠️豆包接口暂时繁忙，请稍后重试！")
            }
            content.scrollTop = content.scrollHeight
        }
        // 回车发送
        input.addEventListener('keydown',e=>e.key==='Enter'&&sendMsg())
    </script>
</body>
</html>
