<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>简易AI对话</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{padding:30px;max-width:800px;margin:0 auto}
        #content{min-height:400px;border:1px #ccc solid;padding:15px;margin-bottom:15px;border-radius:6px}
        .user{color:#2b7cd3;margin:6px 0}
        .ai{color:#222;margin:6px 0}
        #input-box{display:flex;gap:8px}
        #txt{flex:1;padding:10px;border:1px #ccc solid;border-radius:4px}
        #send{padding:10px 22px;background:#409eff;color:#fff;border:none;border-radius:4px;cursor:pointer}
    </style>
</head>
<body>
    <h2>在线AI聊天助手</h2>
    <div id="content"></div>
    <div id="input-box">
        <input id="txt" placeholder="输入内容，回车发送">
        <button id="send" onclick="sendMsg()">发送</button>
    </div>
    <script>
        const content = document.getElementById('content')
        const input = document.getElementById('txt')

        async function sendMsg(){
            let text = input.value.trim()
            if(!text) return
            content.innerHTML += `<div class="user">我：${text}</div>`
            input.value = ''
            //调用公共AI接口
            let res = await fetch(`https://api.qqsuu.cn/api/dm-ai?msg=${encodeURIComponent(text)}`)
            let json = await res.json()
            content.innerHTML += `<div class="ai">AI：${json.data.content}</div>`
            content.scrollTop = content.scrollHeight
        }
        input.addEventListener('keydown',e=>e.key==='Enter'&&sendMsg())
    </script>
</body>
</html>
